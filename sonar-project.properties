# SonarQube configuration
sonar.organization=eloise04
sonar.projectKey=eloise04_flowboard
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx
sonar.exclusions=coverage/**/*,**/*.test.ts,**/*.test.tsx

# Exclude coverage files from analysis
sonar.test.exclusions=coverage/**/*

# Quality Gate settings for new code
sonar.qualitygate.wait=true
sonar.newcode.period=previous_version